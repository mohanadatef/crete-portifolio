<div class="py-12 bg-gray-50 min-h-screen">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="text-center mb-12">
      <h2 class="text-3xl font-extrabold text-gray-900 sm:text-4xl">
        Our Blog
      </h2>
      <p class="mt-4 max-w-2xl text-xl text-gray-500 mx-auto">
        Read the latest news and insights from our team.
      </p>
    </div>

    <!-- Loading State -->
    <div *ngIf="status() === 'loading'" class="flex justify-center items-center py-20">
      <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-crete-gold"></div>
    </div>

    <!-- Error State -->
    <div *ngIf="status() === 'error'" class="text-center py-20">
      <h3 class="text-xl font-medium text-red-600">Error loading blog posts</h3>
      <p class="text-gray-500 mt-2">Please try again later.</p>
    </div>

    <!-- Blog Posts Grid -->
    <div *ngIf="status() === 'success'" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      <div *ngFor="let post of posts()" class="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-lg transition-shadow duration-300">
        <div class="h-48 bg-gray-200 w-full object-cover">
          <!-- Placeholder image since we don't have one in the model directly mapped yet -->
          <div class="w-full h-full bg-gradient-to-br from-blue-100 to-indigo-50 flex items-center justify-center text-gray-400">
             <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
          </div>
        </div>
        <div class="p-6">
          <div class="text-xs font-semibold text-blue-600 tracking-wide uppercase mb-2">
            News
          </div>
          <h3 class="text-xl font-bold text-gray-900 mb-2">
            {{ post.title_en || post.title_ar }}
          </h3>
          <p class="text-gray-600 text-sm mb-4 line-clamp-3">
            {{ post.content_en || post.content_ar }}
          </p>
          <a href="#" class="text-blue-600 font-medium hover:text-blue-800 transition-colors">Read full story &rarr;</a>
        </div>
      </div>

      <!-- Empty State -->
      <div *ngIf="posts().length === 0" class="col-span-full text-center py-20">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-gray-100 mb-4">
          <svg class="w-8 h-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"></path></svg>
        </div>
        <h3 class="text-lg font-medium text-gray-900">No blog posts found</h3>
        <p class="mt-1 text-gray-500">Check back later for new updates.</p>
      </div>
    </div>
  </div>
</div>
