<div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-20 min-h-[60vh] font-sans">
  <!-- Loading State -->
  <div *ngIf="status() === 'loading'" class="text-center py-16">
    <div class="inline-block h-12 w-12 border-4 border-crete-gold border-t-transparent rounded-full animate-spin"></div>
    <p class="text-gray-500 mt-4">Loading page content...</p>
  </div>

  <!-- Not Found State -->
  <div *ngIf="status() === 'not-found'" class="text-center py-16">
    <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
    </svg>
    <h3 class="text-xl font-bold text-gray-800 mt-4">Page Not Found</h3>
    <p class="text-gray-500 mt-2">The page you are looking for does not exist or has been deactivated.</p>
    <a routerLink="/" class="mt-6 inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md shadow-sm text-white bg-crete-blue hover:bg-crete-gold transition-colors">
      Return Home
    </a>
  </div>

  <!-- Error State -->
  <div *ngIf="status() === 'error'" class="text-center py-16">
    <svg class="mx-auto h-12 w-12 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
    </svg>
    <h3 class="text-xl font-bold text-red-600 mt-4">Error Loading Page</h3>
    <p class="text-gray-500 mt-2">We encountered a problem loading this page. Please try again later.</p>
  </div>

  <!-- Success Content View -->
  <div *ngIf="status() === 'success' && page() as p">
    <div class="text-center mb-12">
      <h1 class="text-4xl font-extrabold text-crete-blue mb-4">
        {{ translate.currentLang() === 'ar' ? p.title_ar : p.title_en }}
      </h1>
      <div class="h-1 w-20 bg-crete-gold mx-auto rounded"></div>
    </div>

    <!-- Page Content Container -->
    <div class="bg-white rounded-2xl shadow-xl p-8 border border-gray-100 prose max-w-none leading-relaxed" 
         [innerHTML]="translate.currentLang() === 'ar' ? p.content_ar : p.content_en">
    </div>
  </div>
</div>
