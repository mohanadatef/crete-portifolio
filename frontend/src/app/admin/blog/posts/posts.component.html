<div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
  <!-- Header -->
  <div class="p-6 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
    <div>
      <h2 class="text-xl font-bold text-gray-800">Posts Management</h2>
      <p class="text-sm text-gray-500 mt-1">Manage blog articles and news (Add, Edit, Delete)</p>
    </div>
    <a *appHasPermission="'create-blog-posts'" routerLink="/admin/blog/posts/create" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-lg font-medium transition-colors flex items-center gap-2 shadow-sm">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" />
      </svg>
      Add Blog Post
    </a>
  </div>

  <!-- Filters Header -->
  <div class="p-4 bg-white border-b border-gray-100 flex gap-4">
    <input type="text" [(ngModel)]="filters.search" placeholder="Search by title..." class="border border-gray-300 rounded px-3 py-2 w-1/3 focus:outline-none focus:ring-1 focus:ring-blue-500">
    <select [(ngModel)]="filters.status" class="border border-gray-300 rounded px-3 py-2 w-1/4 focus:outline-none focus:ring-1 focus:ring-blue-500">
      <option value="">All Statuses</option>
      <option value="1">Active</option>
      <option value="0">Draft</option>
    </select>
    <button (click)="loadData()" class="bg-gray-800 hover:bg-gray-900 text-white px-4 py-2 rounded">Apply Filters</button>
  </div>

  <!-- Table -->
  <div class="overflow-x-auto">
    <table class="w-full text-left border-collapse">
      <thead>
        <tr class="bg-gray-50 text-gray-500 text-xs uppercase tracking-wider">
          <th class="p-4 font-semibold">Post Title</th>
          <th class="p-4 font-semibold">Category</th>
          <th class="p-4 font-semibold">Status</th>
          <th class="p-4 font-semibold text-right">Actions</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-100">
        <tr *ngFor="let item of posts()" class="hover:bg-gray-50/50 transition-colors">
          <td class="p-4">
            <div class="flex items-center gap-3">
              <!-- Thumbnail preview -->
              <div class="h-12 w-20 rounded-lg bg-blue-100 flex items-center justify-center text-blue-600 font-bold overflow-hidden border">
                <img *ngIf="item.image" [src]="item.image" class="h-full w-full object-cover">
                <span *ngIf="!item.image" class="text-xs text-gray-400">No Cover</span>
              </div>
              <div>
                <p class="font-medium text-gray-800">{{ item.title_en }}</p>
                <p class="text-xs text-gray-500">{{ item.title_ar }}</p>
              </div>
            </div>
          </td>
          <td class="p-4">
            <span class="px-2.5 py-1 text-xs font-medium rounded-full bg-purple-100 text-purple-700 capitalize">
              {{ item.blog_category?.name_en || 'General' }}
            </span>
          </td>
          <td class="p-4">
            <span *ngIf="item.status" class="px-2.5 py-1 text-xs font-medium rounded-full bg-green-100 text-green-700">Active</span>
            <span *ngIf="!item.status" class="px-2.5 py-1 text-xs font-medium rounded-full bg-gray-100 text-gray-700">Draft</span>
          </td>
          <td class="p-4 text-right">
            <a *appHasPermission="'edit-blog-posts'" [routerLink]="['/admin/blog/posts/edit', item.id]" class="text-blue-600 hover:text-blue-800 font-medium text-sm mr-3">Edit</a>
            <button *appHasPermission="'delete-blog-posts'" (click)="deleteData(item.id)" class="text-red-600 hover:text-red-800 font-medium text-sm">Delete</button>
          </td>
        </tr>
        <tr *ngIf="posts().length === 0">
          <td colspan="4" class="p-8 text-center text-gray-500">No blog posts found.</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
