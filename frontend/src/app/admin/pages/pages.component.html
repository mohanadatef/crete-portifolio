<div class="glass-panel overflow-hidden">
  <!-- Header -->
  <div class="p-6 border-b border-gray-100 flex justify-between items-center bg-white/40 font-sans">
    <div>
      <h2 class="text-xl font-bold text-gray-800">Pages Management</h2>
      <p class="text-sm text-gray-500 mt-1">Manage Pages (Add, Edit, Delete)</p>
    </div>
    <button *appHasPermission="'create-pages'" (click)="openCreatePage()" class="btn-primary flex items-center gap-2 py-2 px-4 text-sm font-semibold">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" />
      </svg>
      Add Page
    </button>
  </div>

  <!-- Filters Row -->
  <div class="p-6 bg-white/20 border-b border-gray-100 flex flex-wrap gap-4 items-center">
    <input type="text" [value]="filters.search" (input)="onSearch($event)" placeholder="Search..." class="input-premium flex-1 min-w-[200px]">
    <div class="flex gap-2 ml-auto sm:ml-0">
      <button (click)="resetFilters()" class="btn-secondary py-2 px-4 text-sm">Reset</button>
    </div>
  </div>

  <!-- Table -->
  <div class="overflow-x-auto font-sans">
    <table class="w-full text-left border-collapse">
      <thead>
        <tr class="bg-gray-50/50">
          <th class="p-4 text-sm font-bold text-gray-600">Title / Name</th>
          <th class="p-4 text-sm font-bold text-gray-600">Slug</th>
          <th class="p-4 text-sm font-bold text-gray-600">Status</th>
          <th class="p-4 text-sm font-bold text-gray-600 text-right">Actions</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-100">
        <tr *ngFor="let item of pages()" class="hover:bg-gray-50/30 transition-colors">
          <td class="p-4 font-semibold text-gray-800">
             {{ item.title_en }} <span class="text-gray-400 font-normal">| {{ item.title_ar }}</span>
          </td>
          <td class="p-4 text-sm text-gray-500 font-mono">
            /pages/{{ item.slug }}
          </td>
          <td class="p-4">
            <span *ngIf="item.status" class="px-2.5 py-1 text-xs font-medium rounded-full bg-green-100 text-green-700">Active</span>
            <span *ngIf="!item.status" class="px-2.5 py-1 text-xs font-medium rounded-full bg-gray-100 text-gray-700">Draft</span>
          </td>
          <td class="p-4 text-right">
            <div class="flex items-center justify-end gap-1.5">
              <button *appHasPermission="'edit-pages'" (click)="openEditPage(item.id)" title="Edit" class="p-2 text-blue-600 hover:text-blue-800 hover:bg-blue-50 rounded-lg transition-colors duration-200">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                </svg>
              </button>
              <ng-container *appHasPermission="'delete-pages'">
                <button *ngIf="item.slug !== 'contact-us' && item.slug !== 'home' && item.slug !== 'about-us'" (click)="deleteData(item.id)" title="Delete" class="p-2 text-red-600 hover:text-red-800 hover:bg-red-50 rounded-lg transition-colors duration-200">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                  </svg>
                </button>
              </ng-container>
            </div>
          </td>
        </tr>
        <tr *ngIf="pages().length === 0">
           <td colspan="4" class="p-12 text-center text-gray-400">
             <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 mx-auto text-gray-300 mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
               <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
             </svg>
             No pages found.
           </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Pagination Footer -->
  <div *ngIf="status() === 'success' && pages().length > 0" class="bg-white/40 px-6 py-4 border-t border-gray-100 flex flex-col sm:flex-row items-center justify-between gap-4 rounded-b-2xl font-sans">
    <div class="flex-1 flex justify-between sm:hidden w-full">
      <button (click)="changePage(currentPage - 1)" [disabled]="currentPage === 1" class="btn-secondary py-1.5 px-3 text-sm disabled:opacity-50">Previous</button>
      <button (click)="changePage(currentPage + 1)" [disabled]="currentPage === lastPage" class="btn-secondary py-1.5 px-3 text-sm disabled:opacity-50">Next</button>
    </div>
    <div class="hidden sm:flex-1 sm:flex sm:items-center sm:justify-between w-full">
      <div class="flex items-center gap-6">
        <p class="text-sm text-gray-600">
          Showing <span class="font-semibold text-gray-800">{{ totalRecords }}</span> total results
        </p>
        <div class="flex items-center gap-2 text-sm text-gray-600">
          <span>Rows per page:</span>
          <select [ngModel]="perPage" (change)="changePerPage($event)" class="border-gray-200 bg-white/50 rounded-lg text-sm py-1.5 pl-3 pr-8 focus:ring-blue-500 focus:border-blue-500 shadow-sm text-gray-900">
            <option [value]="10">10</option>
            <option [value]="15">15</option>
            <option [value]="30">30</option>
            <option [value]="50">50</option>
            <option [value]="100">100</option>
          </select>
        </div>
      </div>
      <div>
        <nav class="relative z-0 inline-flex rounded-lg shadow-sm -space-x-px bg-white border border-gray-200 overflow-hidden" aria-label="Pagination">
          <button (click)="changePage(currentPage - 1)" [disabled]="currentPage === 1" class="relative inline-flex items-center px-3 py-2 bg-white text-gray-500 hover:bg-gray-50 disabled:opacity-50 transition-colors">
            <span class="sr-only">Previous</span>
            <svg class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
              <path fill-rule="evenodd" d="M12.707 5.293a1 1 0 010 1.414L9.414 10l3.293 3.293a1 1 0 01-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z" clip-rule="evenodd" />
            </svg>
          </button>
          <span class="relative inline-flex items-center px-4 py-2 bg-gray-50/50 text-sm font-medium text-gray-700 border-x border-gray-100">
            Page {{ currentPage }} of {{ lastPage }}
          </span>
          <button (click)="changePage(currentPage + 1)" [disabled]="currentPage === lastPage" class="relative inline-flex items-center px-3 py-2 bg-white text-gray-500 hover:bg-gray-50 disabled:opacity-50 transition-colors">
            <span class="sr-only">Next</span>
            <svg class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
              <path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd" />
            </svg>
          </button>
        </nav>
      </div>
    </div>
  </div>
</div>
