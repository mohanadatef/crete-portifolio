<div class="glass-panel overflow-hidden">
  <div class="p-6 border-b border-gray-100 flex justify-between items-center bg-white/50">
    <div>
      <h2 class="text-xl font-bold text-gray-800">Pages Management</h2>
      <p class="text-sm text-gray-500 mt-1">Manage Pages (Add, Edit, Delete)</p>
    </div>
    <button *appHasPermission="'create-pages'" (click)="openModal()" class="btn-primary flex items-center gap-2">
      Add Page
    </button>
  </div>

  <div class="p-4 bg-white/30 border-b border-gray-100 flex gap-4">
    <input type="text" [(ngModel)]="filters.search" placeholder="Search..." class="input-premium w-1/3">
    <button (click)="loadData(1)" class="btn-secondary">Apply Filters</button>
  </div>

  <div class="overflow-x-auto">
    <table class="w-full text-left border-collapse">
      <thead>
        <tr>
          <th>Title / Name</th>
          <th>Status</th>
          <th class="text-right">Actions</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-100">
        <tr *ngFor="let item of pages()">
          <td class="p-4 font-medium text-gray-800">
             {{ item.title_en }} ({{ item.title_ar }})
          </td>
          <td class="p-4">
            <span *ngIf="item.status" class="px-2.5 py-1 text-xs rounded-full bg-green-100 text-green-700">Active</span>
            <span *ngIf="!item.status" class="px-2.5 py-1 text-xs rounded-full bg-gray-100 text-gray-700">Draft</span>
          </td>
          <td class="p-4 flex gap-2 justify-end">
             <button *appHasPermission="'edit-pages'" (click)="openModal(item)" class="text-blue-600 hover:text-blue-800">Edit</button>
             <button *appHasPermission="'delete-pages'" (click)="deleteData(item.id)" class="text-red-600 hover:text-red-800">Delete</button>
          </td>
        </tr>
        <tr *ngIf="pages().length === 0">
           <td colspan="3" class="p-8 text-center text-gray-500">No data found.</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Pagination Footer -->
  <div *ngIf="status() === 'success' && pages().length > 0" class="bg-white px-4 py-3 border-t border-gray-200 flex flex-col sm:flex-row items-center justify-between sm:px-6 rounded-b-lg">
    <div class="flex-1 flex justify-between sm:hidden w-full mb-4 sm:mb-0">
      <button (click)="changePage(currentPage - 1)" [disabled]="currentPage === 1" class="relative inline-flex items-center px-4 py-2 border border-gray-300 text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50 disabled:opacity-50">Previous</button>
      <button (click)="changePage(currentPage + 1)" [disabled]="currentPage === lastPage" class="ml-3 relative inline-flex items-center px-4 py-2 border border-gray-300 text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50 disabled:opacity-50">Next</button>
    </div>
    <div class="hidden sm:flex-1 sm:flex sm:items-center sm:justify-between">
      <div class="flex items-center gap-4">
        <p class="text-sm text-gray-700">
          Showing <span class="font-medium">{{ totalRecords }}</span> total results
        </p>
        <div class="flex items-center gap-2 text-sm text-gray-700">
          <span>Rows per page:</span>
          <select [ngModel]="perPage" (change)="changePerPage($event)" class="border-gray-300 rounded text-sm py-1 pl-2 pr-6 focus:ring-blue-500 focus:border-blue-500">
            <option value="15">15</option>
            <option value="30">30</option>
            <option value="50">50</option>
            <option value="100">100</option>
          </select>
        </div>
      </div>
      <div>
        <nav class="relative z-0 inline-flex rounded-md shadow-sm -space-x-px" aria-label="Pagination">
          <button (click)="changePage(currentPage - 1)" [disabled]="currentPage === 1" class="relative inline-flex items-center px-2 py-2 rounded-l-md border border-gray-300 bg-white text-sm font-medium text-gray-500 hover:bg-gray-50 disabled:opacity-50">
            <span class="sr-only">Previous</span>
            <svg class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
              <path fill-rule="evenodd" d="M12.707 5.293a1 1 0 010 1.414L9.414 10l3.293 3.293a1 1 0 01-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z" clip-rule="evenodd" />
            </svg>
          </button>
          <span class="relative inline-flex items-center px-4 py-2 border border-gray-300 bg-white text-sm font-medium text-gray-700">
            Page {{ currentPage }} of {{ lastPage }}
          </span>
          <button (click)="changePage(currentPage + 1)" [disabled]="currentPage === lastPage" class="relative inline-flex items-center px-2 py-2 rounded-r-md border border-gray-300 bg-white text-sm font-medium text-gray-500 hover:bg-gray-50 disabled:opacity-50">
            <span class="sr-only">Next</span>
            <svg class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
              <path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd" />
            </svg>
          </button>
        </nav>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div *ngIf="showModal()" class="fixed inset-0 z-50 flex items-center justify-center bg-gray-900/40 backdrop-blur-sm">
  <div class="bg-white rounded-xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto">
    <div class="p-6 border-b border-gray-100 flex justify-between items-center">
      <h3 class="text-lg font-bold text-gray-800">Add/Edit Page</h3>
      <button (click)="closeModal()" class="text-gray-400 hover:text-gray-600">&times;</button>
    </div>
    <div class="p-6">
      <form [formGroup]="dataForm" (ngSubmit)="saveData()" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Title Ar</label>
          <input type="text" formControlName="title_ar" class="input-premium">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Title En</label>
          <input type="text" formControlName="title_en" class="input-premium">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Slug</label>
          <input type="text" formControlName="slug" class="input-premium">
        </div>
        <div dir="rtl">
          <label class="block text-sm font-medium text-gray-700 mb-1">Content Ar</label>
          <quill-editor formControlName="content_ar" [styles]="{height: '150px'}" placeholder="اكتب محتوى الصفحة هنا..."></quill-editor>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Content En</label>
          <quill-editor formControlName="content_en" [styles]="{height: '150px'}" placeholder="Enter page content here..."></quill-editor>
        </div>
        <div>
          <label class="flex items-center gap-2">
            <input type="checkbox" formControlName="status"> Active
          </label>
        </div>

        <div class="pt-4 flex justify-end gap-3">
          <button type="button" (click)="closeModal()" class="btn-secondary">Cancel</button>
          <button type="submit" class="btn-primary">Save Changes</button>
        </div>
      </form>
    </div>
  </div>
</div>
