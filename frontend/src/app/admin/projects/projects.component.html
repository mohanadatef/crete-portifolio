<div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">

          <th class="p-4 font-semibold">Status</th>

        <tr class="hover:bg-gray-50/50 transition-colors">

                <p class="text-xs text-gray-500">royal-palm-villa</p>

          <td class="p-4 text-gray-600">Downtown Dubai</td>
          <td class="p-4">
            <span class="px-2.5 py-1 text-xs font-medium rounded-full bg-green-100 text-green-700">Published</span>
          </td>
          <td class="p-4">
            <span class="px-2.5 py-1 text-xs font-medium rounded-full bg-yellow-100 text-yellow-700">Yes</span>
          </td>
          <td class="p-4 text-right">
            <button class="text-blue-600 hover:text-blue-800 font-medium text-sm mr-3">Edit</button>
