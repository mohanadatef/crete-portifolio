<div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
  <!-- Header -->
  <div class="p-6 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
    <div>
      <h2 class="text-xl font-bold text-gray-800">Projects Management</h2>
      <p class="text-sm text-gray-500 mt-1">Manage real estate projects (Add, Edit, Delete)</p>
    </div>
    <button *appHasPermission="'create-projects'" (click)="openModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-lg font-medium transition-colors flex items-center gap-2 shadow-sm">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" />
      </svg>
      Add Project
    </button>
  </div>

  <!-- Filters Header -->
  <div class="p-4 bg-white border-b border-gray-100 flex gap-4">
    <input type="text" [(ngModel)]="filters.search" placeholder="Search by title..." class="border border-gray-300 rounded px-3 py-2 w-1/3 focus:outline-none focus:ring-1 focus:ring-blue-500">
    <select [(ngModel)]="filters.project_type_id" class="border border-gray-300 rounded px-3 py-2 w-1/4 focus:outline-none focus:ring-1 focus:ring-blue-500">
      <option value="">All Types</option>
      <option *ngFor="let t of projectTypes()" [value]="t.id">{{ t.name_en }} ({{ t.name_ar }})</option>
    </select>
    <select [(ngModel)]="filters.status" class="border border-gray-300 rounded px-3 py-2 w-1/4 focus:outline-none focus:ring-1 focus:ring-blue-500">
      <option value="">All Statuses</option>
      <option value="1">Published</option>
      <option value="0">Draft</option>
    </select>
    <button (click)="loadProjects()" class="bg-gray-800 hover:bg-gray-900 text-white px-4 py-2 rounded">Apply Filters</button>
  </div>

  <!-- Table -->
  <div class="overflow-x-auto">
    <table class="w-full text-left border-collapse">
      <thead>
        <tr class="bg-gray-50 text-gray-500 text-xs uppercase tracking-wider">
          <th class="p-4 font-semibold">Project Title</th>
          <th class="p-4 font-semibold">Location</th>
          <th class="p-4 font-semibold">Status</th>
          <th class="p-4 font-semibold">Type</th>
          <th class="p-4 font-semibold text-right">Actions</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-100">
        <tr *ngFor="let p of projects()" class="hover:bg-gray-50/50 transition-colors">
          <td class="p-4">
            <div class="flex items-center gap-3">
              <div class="h-10 w-10 rounded-lg bg-blue-100 flex items-center justify-center text-blue-600 font-bold">
                {{ p.title_en.charAt(0) || 'P' }}
              </div>
              <div>
                <p class="font-medium text-gray-800">{{ p.title_en }}</p>
                <p class="text-xs text-gray-500">{{ p.slug }}</p>
              </div>
            </div>
          </td>
          <td class="p-4 text-gray-600">{{ p.location }}</td>
          <td class="p-4">
            <span *ngIf="p.status" class="px-2.5 py-1 text-xs font-medium rounded-full bg-green-100 text-green-700">Published</span>
            <span *ngIf="!p.status" class="px-2.5 py-1 text-xs font-medium rounded-full bg-gray-100 text-gray-700">Draft</span>
          </td>
          <td class="p-4">
            <span class="px-2.5 py-1 text-xs font-medium rounded-full bg-purple-100 text-purple-700 capitalize">{{ p.project_type?.name_en || 'N/A' }}</span>
          </td>
          <td class="p-4 text-right">
            <button *appHasPermission="'edit-projects'" class="text-blue-600 hover:text-blue-800 font-medium text-sm mr-3">Edit</button>
            <button *appHasPermission="'delete-projects'" class="text-red-600 hover:text-red-800 font-medium text-sm">Delete</button>
          </td>
        </tr>
        <tr *ngIf="projects.length === 0">
          <td colspan="5" class="p-8 text-center text-gray-500">No projects found.</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Modal Form -->
  <div *ngIf="showModal()" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50">
    <div class="bg-white rounded-xl shadow-lg w-full max-w-2xl max-h-[90vh] overflow-y-auto">
      <div class="p-6 border-b border-gray-100 flex justify-between items-center sticky top-0 bg-white z-10">
        <h3 class="text-lg font-bold">Add/Edit Project</h3>
        <button (click)="closeModal()" class="text-gray-400 hover:text-gray-600">
          <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
      </div>
      <form (ngSubmit)="saveProject()" class="p-6">
        <div class="grid grid-cols-2 gap-4 mb-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Title (AR) *</label>
            <input type="text" formControlName="title_ar" name="title_ar" required class="w-full border border-gray-300 rounded px-3 py-2">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Title (EN) *</label>
            <input type="text" formControlName="title_en" name="title_en" required class="w-full border border-gray-300 rounded px-3 py-2">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Slug *</label>
            <input type="text" formControlName="slug" name="slug" required class="w-full border border-gray-300 rounded px-3 py-2">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Location</label>
            <input type="text" formControlName="location" name="location" class="w-full border border-gray-300 rounded px-3 py-2">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Project Type</label>
            <select formControlName="project_type_id" name="project_type_id" class="w-full border border-gray-300 rounded px-3 py-2">
              <option value="">Select a Type</option>
              <option *ngFor="let t of projectTypes()" [value]="t.id">{{ t.name_en }} ({{ t.name_ar }})</option>
            </select>
          </div>
        </div>
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1">Description (AR)</label>
          <textarea formControlName="description_ar" name="description_ar" rows="3" class="w-full border border-gray-300 rounded px-3 py-2"></textarea>
        </div>
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1">Description (EN)</label>
          <textarea formControlName="description_en" name="description_en" rows="3" class="w-full border border-gray-300 rounded px-3 py-2"></textarea>
        </div>
        <div class="grid grid-cols-2 gap-4 mb-4">
          <div class="flex items-center gap-2 mt-6">
            <input type="checkbox" formControlName="status" name="status" id="statusCheckbox">
            <label for="statusCheckbox" class="text-sm font-medium text-gray-700">Published</label>
          </div>
          <div class="flex items-center gap-2 mt-6">
            <input type="checkbox" formControlName="featured" name="featured" id="featuredCheckbox">
            <label for="featuredCheckbox" class="text-sm font-medium text-gray-700">Featured Project</label>
          </div>
        </div>
        <div class="mb-6">
          <label class="block text-sm font-medium text-gray-700 mb-1">Project Images</label>
          <input type="file" multiple (change)="onFileSelect($event)" class="w-full border border-gray-300 rounded px-3 py-2">
        </div>
        <div class="flex justify-end gap-3 pt-4 border-t border-gray-100">
          <button type="button" (click)="closeModal()" class="px-4 py-2 text-gray-600 bg-gray-100 hover:bg-gray-200 rounded font-medium">Cancel</button>
          <button type="submit" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded font-medium">Save Project</button>
        </div>
      </form>
    </div>
  </div>
</div>
