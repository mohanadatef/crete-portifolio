<div class="bg-white rounded-lg shadow-sm border border-gray-100 p-6">
  <div class="flex justify-between items-center mb-6">
    <h2 class="text-2xl font-bold text-gray-800">Leads & Inquiries</h2>
  </div>

  <div *ngIf="status === 'loading'" class="text-center py-10">
    <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600 mx-auto"></div>
  </div>

  <div *ngIf="status === 'success' && leads.length === 0" class="text-center py-10 text-gray-500">
    No leads found.
  </div>

  <div *ngIf="status === 'success' && leads.length > 0" class="overflow-x-auto">
    <table class="min-w-full divide-y divide-gray-200">
      <thead class="bg-gray-50">
        <tr>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Date</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Name</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Contact</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Message</th>
        </tr>
      </thead>
      <tbody class="bg-white divide-y divide-gray-200">
        <tr *ngFor="let lead of leads">
          <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{{ lead.created_at | date }}</td>
          <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">{{ lead.name }}</td>
          <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
            <div>{{ lead.email }}</div>
            <div>{{ lead.phone }}</div>
          </td>
          <td class="px-6 py-4 text-sm text-gray-500 max-w-xs truncate">{{ lead.message }}</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
