<div class="min-h-screen bg-gray-50 flex flex-col font-sans transition-all duration-300">
  <header class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-20">
        <div class="flex-shrink-0 flex items-center">
          <a routerLink="/" class="text-3xl font-extrabold tracking-tighter text-crete-blue">
            CRETE<span class="text-crete-gold">.</span>
          </a>
        </div>
        <nav class="hidden md:flex space-x-10 rtl:space-x-reverse items-center">
          <a routerLink="/" class="text-gray-600 hover:text-crete-gold font-medium transition-colors">{{ 'NAV.HOME' | translate }}</a>
          <a routerLink="/projects" class="text-gray-600 hover:text-crete-gold font-medium transition-colors">{{ 'NAV.PROJECTS' | translate }}</a>
          <a routerLink="/blog" class="text-gray-600 hover:text-crete-gold font-medium transition-colors">{{ 'NAV.BLOG' | translate }}</a>
          <a routerLink="/contact" class="text-gray-600 hover:text-crete-gold font-medium transition-colors">{{ 'NAV.CONTACT' | translate }}</a>
          
          <button (click)="toggleLanguage()" class="ml-4 rtl:mr-4 rtl:ml-0 bg-gray-100 hover:bg-gray-200 text-gray-800 px-3 py-1 rounded-full text-sm font-bold transition-colors">
            {{ translate.currentLang() === 'en' ? 'العربية' : 'English' }}
          </button>
        </nav>
        <div class="flex items-center">
          <button class="bg-crete-gold text-white px-5 py-2.5 rounded-md text-sm font-bold hover:bg-yellow-600 transition shadow-sm">Get Started</button>
        </div>
      </div>
    </div>
  </header>

  <main class="flex-grow bg-gray-50">
    <router-outlet></router-outlet>
  </main>

  <footer class="bg-crete-blue text-white py-12">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
      <div class="mb-6 flex flex-col items-center justify-center">
        <span class="text-3xl font-extrabold tracking-wider flex items-center">
          CRE<span class="text-crete-gold mx-0.5">T</span>E
        </span>
        <span class="text-[10px] tracking-[0.3em] uppercase text-gray-300">Developments</span>
      </div>
      <p class="text-sm text-gray-400">&copy; 2026 CRETE Developments. All rights reserved.</p>
    </div>
  </footer>
</div>
