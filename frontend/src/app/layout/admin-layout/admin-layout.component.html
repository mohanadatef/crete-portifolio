<div class="flex h-screen bg-gray-50 overflow-hidden">

    <!-- ===== Sidebar ===== -->
    <aside
        class="flex flex-col shadow-xl flex-shrink-0 transition-all duration-300 ease-in-out"
        [class.w-64]="sidebarOpen()"
        [class.w-0]="!sidebarOpen()"
        [style.background-color]="'var(--admin-primary-color, #1e3678)'"
        style="overflow:hidden"
    >
        <!-- Sidebar Brand/Logo -->
        <div class="p-6 border-b border-white/10 flex items-center justify-between min-w-[256px]">
            <h2 dir="ltr" class="text-xl font-bold flex items-center gap-2">
                <img *ngIf="siteLogo() as logoUrl; else textLogo" [src]="logoUrl" [alt]="siteName()" class="h-9 max-w-[150px] object-contain">
                <ng-template #textLogo>
                  <span class="tracking-wider uppercase">{{ siteName() }}</span>
                </ng-template>
            </h2>
            <span class="text-[10px] font-semibold px-2 py-0.5 rounded bg-white/20 ml-1">Admin</span>
        </div>
        
        <!-- Navigation Menu -->
        <nav class="flex-1 p-4 space-y-6 overflow-y-auto min-w-[256px]">
            <!-- Main Section -->
            <div class="space-y-1">
                <span class="text-xs font-semibold text-gray-300/60 uppercase tracking-wider px-3 block mb-2">Main</span>
                <a routerLink="/admin/dashboard" routerLinkActive="bg-white/15 text-white border-l-4 border-yellow-500 font-semibold" [routerLinkActiveOptions]="{exact: true}" class="flex items-center py-2.5 px-3 rounded-lg hover:bg-white/10 transition text-gray-200">
                    <i class="fi fi-rr-apps mr-3 rtl:ml-3 rtl:mr-0"></i>
                    <span>Dashboard</span>
                </a>
                <a *appHasPermission="'view-all-leads'" routerLink="/admin/reports" routerLinkActive="bg-white/15 text-white border-l-4 border-yellow-500 font-semibold" class="flex items-center py-2.5 px-3 rounded-lg hover:bg-white/10 transition text-gray-200">
                    <i class="fi fi-rr-chart-pie mr-3 rtl:ml-3 rtl:mr-0"></i>
                    <span>Reports</span>
                </a>
            </div>

            <!-- Content Management Section -->
            <div class="space-y-1">
                <span class="text-xs font-semibold text-gray-300/60 uppercase tracking-wider px-3 block mb-2">Content</span>
                
                <a *appHasPermission="'view-projects'" routerLink="/admin/projects" routerLinkActive="bg-white/15 text-white border-l-4 border-yellow-500 font-semibold" class="flex items-center py-2.5 px-3 rounded-lg hover:bg-white/10 transition text-gray-200">
                    <i class="fi fi-rr-building mr-3 rtl:ml-3 rtl:mr-0"></i>
                    <span>Projects</span>
                </a>
                <a *appHasPermission="'view-project-types'" routerLink="/admin/project-types" routerLinkActive="bg-white/15 text-white border-l-4 border-yellow-500 font-semibold" class="flex items-center py-2.5 px-3 rounded-lg hover:bg-white/10 transition text-gray-200">
                    <i class="fi fi-rr-settings-sliders mr-3 rtl:ml-3 rtl:mr-0"></i>
                    <span>Project Types</span>
                </a>
                <a *appHasPermission="'view-features'" routerLink="/admin/features" routerLinkActive="bg-white/15 text-white border-l-4 border-yellow-500 font-semibold" class="flex items-center py-2.5 px-3 rounded-lg hover:bg-white/10 transition text-gray-200">
                    <i class="fi fi-rr-star mr-3 rtl:ml-3 rtl:mr-0"></i>
                    <span>Project Features</span>
                </a>
                <a *appHasPermission="'view-landing-pages'" routerLink="/admin/landing-pages" routerLinkActive="bg-white/15 text-white border-l-4 border-yellow-500 font-semibold" class="flex items-center py-2.5 px-3 rounded-lg hover:bg-white/10 transition text-gray-200">
                    <i class="fi fi-rr-browser mr-3 rtl:ml-3 rtl:mr-0"></i>
                    <span>Landing Pages</span>
                </a>
                <a *appHasPermission="'view-pages'" routerLink="/admin/pages" routerLinkActive="bg-white/15 text-white border-l-4 border-yellow-500 font-semibold" class="flex items-center py-2.5 px-3 rounded-lg hover:bg-white/10 transition text-gray-200">
                    <i class="fi fi-rr-document mr-3 rtl:ml-3 rtl:mr-0"></i>
                    <span>Pages</span>
                </a>
                <a *appHasPermission="'view-blog-posts'" routerLink="/admin/blog/posts" routerLinkActive="bg-white/15 text-white border-l-4 border-yellow-500 font-semibold" class="flex items-center py-2.5 px-3 rounded-lg hover:bg-white/10 transition text-gray-200">
                    <i class="fi fi-rr-document-signed mr-3 rtl:ml-3 rtl:mr-0"></i>
                    <span>Blog Posts</span>
                </a>
                <a *appHasPermission="'view-blog-categories'" routerLink="/admin/blog/categories" routerLinkActive="bg-white/15 text-white border-l-4 border-yellow-500 font-semibold" class="flex items-center py-2.5 px-3 rounded-lg hover:bg-white/10 transition text-gray-200">
                    <i class="fi fi-rr-list mr-3 rtl:ml-3 rtl:mr-0"></i>
                    <span>Blog Categories</span>
                </a>
            </div>

            <!-- Leads Management -->
            <div class="space-y-1">
                <span class="text-xs font-semibold text-gray-300/60 uppercase tracking-wider px-3 block mb-2">Customers</span>
                <a *appHasPermission="'view-leads'" routerLink="/admin/leads" routerLinkActive="bg-white/15 text-white border-l-4 border-yellow-500 font-semibold" class="flex items-center py-2.5 px-3 rounded-lg hover:bg-white/10 transition text-gray-200">
                    <i class="fi fi-rr-envelope mr-3 rtl:ml-3 rtl:mr-0"></i>
                    <span>Leads</span>
                </a>
                <a *appHasPermission="'manage-blocklist'" routerLink="/admin/blocklist" routerLinkActive="bg-white/15 text-white border-l-4 border-yellow-500 font-semibold" class="flex items-center py-2.5 px-3 rounded-lg hover:bg-white/10 transition text-gray-200">
                    <i class="fi fi-rr-ban mr-3 rtl:ml-3 rtl:mr-0"></i>
                    <span>Lead Blocklist</span>
                </a>
            </div>

            <div class="space-y-1">
                <span class="text-xs font-semibold text-gray-300/60 uppercase tracking-wider px-3 block mb-2">System</span>
                
                <a *appHasPermission="'view-users'" routerLink="/admin/users" routerLinkActive="bg-white/15 text-white border-l-4 border-yellow-500 font-semibold" class="flex items-center py-2.5 px-3 rounded-lg hover:bg-white/10 transition text-gray-200">
                    <i class="fi fi-rr-user mr-3 rtl:ml-3 rtl:mr-0"></i>
                    <span>Users</span>
                </a>
                <a *appHasPermission="'view-roles'" routerLink="/admin/roles" routerLinkActive="bg-white/15 text-white border-l-4 border-yellow-500 font-semibold" class="flex items-center py-2.5 px-3 rounded-lg hover:bg-white/10 transition text-gray-200">
                    <i class="fi fi-rr-shield mr-3 rtl:ml-3 rtl:mr-0"></i>
                    <span>Roles</span>
                </a>
                <a *appHasPermission="'view-settings'" routerLink="/admin/settings" routerLinkActive="bg-white/15 text-white border-l-4 border-yellow-500 font-semibold" class="flex items-center py-2.5 px-3 rounded-lg hover:bg-white/10 transition text-gray-200">
                    <i class="fi fi-rr-settings mr-3 rtl:ml-3 rtl:mr-0"></i>
                    <span>Settings</span>
                </a>
                <a routerLink="/admin/support" routerLinkActive="bg-white/15 text-white border-l-4 border-yellow-500 font-semibold" class="flex items-center py-2.5 px-3 rounded-lg hover:bg-white/10 transition text-gray-200">
                    <i class="fi fi-rr-headset mr-3 rtl:ml-3 rtl:mr-0"></i>
                    <span>Support</span>
                </a>
            </div>
        </nav>
        
        <!-- Sidebar Footer -->
        <div class="p-4 border-t border-white/10 min-w-[256px]">
            <button (click)="logout()" class="w-full flex items-center justify-center gap-2 py-2.5 bg-red-600 hover:bg-red-700 text-white rounded-lg transition font-medium">
                <i class="fi fi-rr-sign-out-alt"></i>
                <span>Logout</span>
            </button>
        </div>
    </aside>

    <!-- ===== Main Content Area ===== -->
    <div class="flex flex-col flex-grow min-w-0 overflow-hidden">

        <!-- Top Header Bar -->
        <header class="flex items-center gap-3 px-6 py-3.5 bg-white border-b border-gray-100 shadow-sm flex-shrink-0">
            <!-- Sidebar Toggle Button -->
            <button
                (click)="toggleSidebar()"
                class="p-2 rounded-lg hover:bg-gray-100 transition-colors text-gray-500 hover:text-gray-800"
                [title]="sidebarOpen() ? 'Collapse Sidebar' : 'Expand Sidebar'"
            >
                <!-- Hamburger / Close icon -->
                <svg *ngIf="!sidebarOpen()" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                </svg>
                <svg *ngIf="sidebarOpen()" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7M18 19l-7-7 7-7"/>
                </svg>
            </button>

            <!-- Breadcrumb / Site Name -->
            <span class="text-sm font-semibold text-gray-700">{{ siteName() }} Admin</span>

            <div class="ml-auto flex items-center gap-2 text-xs text-gray-400">
                <span class="inline-block w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                <span>Online</span>
            </div>
        </header>

        <!-- Scrollable Page Content -->
        <main class="flex-grow overflow-y-auto p-8">
            <router-outlet></router-outlet>
        </main>
    </div>
</div>
