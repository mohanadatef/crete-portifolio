<div class="flex h-screen bg-gray-50">
    <!-- Basic Sidebar -->
    <aside class="w-64 text-white flex flex-col" [style.background-color]="'var(--admin-primary-color, #1e3678)'">
        <div class="p-6 border-b border-white/10">
            <h2 dir="ltr" class="text-xl font-bold flex items-center justify-start gap-2">
                <img *ngIf="siteLogo() as logoUrl; else textLogo" [src]="logoUrl" [alt]="siteName()" class="h-8 max-w-[150px] object-contain brightness-0 invert">
                <ng-template #textLogo>
                  {{ siteName() }} <span class="text-xs font-semibold px-2 py-0.5 rounded bg-white/20 ml-1">Admin</span>
                </ng-template>
            </h2>
        </div>
        <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
            <a routerLink="/admin/dashboard" class="block py-2 px-4 rounded hover:bg-white/10 transition">Dashboard</a>
            
            <a *appHasPermission="'view-projects'" routerLink="/admin/projects" class="block py-2 px-4 rounded hover:bg-white/10 transition">Projects</a>
            <a *appHasPermission="'view-project-types'" routerLink="/admin/project-types" class="block py-2 px-4 rounded hover:bg-white/10 transition">Project Types</a>
            <a *appHasPermission="'view-landing-pages'" routerLink="/admin/landing-pages" class="block py-2 px-4 rounded hover:bg-white/10 transition">Landing Pages</a>
            <a *appHasPermission="'view-leads'" routerLink="/admin/leads" class="block py-2 px-4 rounded hover:bg-white/10 transition">Leads</a>
            <a *appHasPermission="'view-pages'" routerLink="/admin/pages" class="block py-2 px-4 rounded hover:bg-white/10 transition">Pages</a>
            <a *appHasPermission="'view-blog-posts'" routerLink="/admin/blog/posts" class="block py-2 px-4 rounded hover:bg-white/10 transition">Blog Posts</a>
            <a *appHasPermission="'view-blog-categories'" routerLink="/admin/blog/categories" class="block py-2 px-4 rounded hover:bg-white/10 transition">Blog Categories</a>
            
            <a *appHasPermission="'view-users'" routerLink="/admin/users" class="block py-2 px-4 rounded hover:bg-white/10 transition text-yellow-400 font-bold mt-4">Users</a>
            <a *appHasPermission="'view-roles'" routerLink="/admin/roles" class="block py-2 px-4 rounded hover:bg-white/10 transition text-yellow-400 font-bold">Roles</a>
            
            <a *appHasPermission="'view-settings'" routerLink="/admin/settings" class="block py-2 px-4 rounded hover:bg-white/10 transition mt-4">Settings</a>
        </nav>
        <div class="p-4 border-t border-white/10">
            <button routerLink="/admin/login" class="w-full py-2 bg-red-600 hover:bg-red-700 text-white rounded transition">Logout</button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto p-8">
        <router-outlet></router-outlet>
    </main>
</div>
